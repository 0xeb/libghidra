syntax = "proto3";

package libghidra;

option java_multiple_files = true;
option java_package = "libghidra";
option java_outer_classname = "CommonProto";

message ErrorDetail {
  string code = 1;
  string message = 2;
  string source = 3;
}

message Pagination {
  uint32 limit = 1;
  uint32 offset = 2;
}

message AddressRange {
  uint64 start = 1;
  uint64 end = 2;
}

enum ShutdownPolicy {
  SHUTDOWN_POLICY_UNSPECIFIED = 0;
  SHUTDOWN_POLICY_SAVE = 1;
  SHUTDOWN_POLICY_DISCARD = 2;
  SHUTDOWN_POLICY_NONE = 3;
}
